name = "memos-worker"
compatibility_date = "2025-08-19"
main = "src/index.js"
[assets]
directory = "./src/public"
run_worker_first = [
	"/api/*"
]

[[d1_databases]]
binding = "DB"
database_id = "498cb5df-a5a0-4e63-aab8-7abedb6f358a"
database_name = "YOUR_D1_DATABASE_NAME"

[[kv_namespaces]]
binding = "NOTES_KV"
id = "66a81478658946e383b2ede5c53b29ab"
preview_id = ""

[[r2_buckets]]
binding = "NOTES_R2_BUCKET"
bucket_name = "YOUR_R2_BUCKET_NAME"
preview_bucket_name = "notes-r2-bucket"
